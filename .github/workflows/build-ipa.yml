name: Build Spotify Premium IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore workloads
        run: dotnet workload restore

      - name: Restore dependencies
        run: dotnet restore

      - name: Build IPA
        run: dotnet publish -f net9.0-ios -c Release -p:BuildIpa=true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpotifyPremium
          path: '**/*.ipa'
